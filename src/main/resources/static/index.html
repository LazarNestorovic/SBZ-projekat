<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <title>Ne Ljuti Se Čovječe — AI Agent</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>Ne Ljuti Se Čovječe <span id="game-id-label"></span></h1>
  </header>

  <main>
    <!-- Left: board canvas -->
    <section id="board-section">
      <canvas id="board" width="700" height="700"></canvas>
    </section>

    <!-- Right: info panels -->
    <aside id="panels">

      <div class="panel" id="turn-panel">
        <h2>Potez</h2>
        <div id="dice-display">🎲 –</div>
        <div id="modus-badge" class="badge neutralni">NEUTRALNI</div>
        <div id="bonus-badge" class="badge bonus hidden">BONUS ROLL!</div>
        <div id="preskaci-badge" class="badge preskaci hidden">PRESKAČEMO</div>
        <div id="turn-info">
          <strong>Igrac:</strong> <span id="active-player">–</span><br/>
          <strong>Sljedeći:</strong> <span id="next-player">–</span><br/>
          <strong>Razlog:</strong> <span id="razlog">–</span><br/>
          <strong>Prioritet:</strong> <span id="prioritet">–</span>
        </div>
        <button id="btn-roll" onclick="roll()">🎲 Baci kocku</button>
        <button id="btn-new"  onclick="newGame()">🔄 Nova igra</button>
      </div>

      <div class="panel" id="events-panel">
        <h2>CEP Dogadjaji</h2>
        <ul id="events-log"></ul>
      </div>

      <div class="panel" id="stats-panel">
        <h2>Statistike</h2>
        <table id="stats-table">
          <thead>
            <tr>
              <th>Igrac</th><th>Potezi</th><th>Elim↑</th><th>Elim↓</th>
              <th>U cilju</th><th>Stil</th><th>W%</th>
            </tr>
          </thead>
          <tbody id="stats-body"></tbody>
        </table>
      </div>

      <div class="panel" id="winner-panel" style="display:none">
        <h2 id="winner-text"></h2>
      </div>

    </aside>
  </main>

  <script src="js/board.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
