server.port=8080
spring.main.banner-mode=off

# Suppress Drools / KIE / MVEL noise
logging.level.org.drools=OFF
logging.level.org.kie=OFF
logging.level.org.mvel2=OFF
logging.level.org.jboss=OFF

# Show only essential Spring Boot startup info
logging.level.org.springframework.boot.web.embedded=INFO
logging.level.root=WARN
